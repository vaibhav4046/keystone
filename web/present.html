<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self'; object-src 'none'">
<title>Keystone - presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#000; --ink:#F6EFE6; --dim:#B59B86; --orange:#FF7A1A; --amber:#FFC24D; --green:#34D399; --panel:#14100b; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased}
  .grain{position:fixed; inset:0; background-image:repeating-linear-gradient(90deg,rgba(255,255,255,0.05) 0,rgba(255,255,255,0.05) 1px,transparent 1px,transparent 84px); -webkit-mask-image:linear-gradient(to bottom,transparent,#000 14%,#000 86%,transparent); mask-image:linear-gradient(to bottom,transparent,#000 14%,#000 86%,transparent); pointer-events:none; z-index:0}
  .glow{position:fixed; left:0; right:0; bottom:0; height:60vh; background:radial-gradient(130% 100% at 50% 100%,rgba(240,72,10,0.22),rgba(255,122,26,0.06) 38%,transparent 70%); pointer-events:none; z-index:0}
  .stage{position:relative; z-index:1; height:100%; display:flex; align-items:center; justify-content:center; padding:6vh 7vw}
  .slide{position:absolute; inset:0; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; padding:7vh 8vw; opacity:0; transform:translateY(24px); transition:opacity .5s cubic-bezier(.16,1,.3,1), transform .5s cubic-bezier(.16,1,.3,1); pointer-events:none}
  .slide.on{opacity:1; transform:none; pointer-events:auto}
  .eyebrow{font:600 13px/1 'JetBrains Mono',ui-monospace,monospace; letter-spacing:.24em; text-transform:uppercase; color:#C9A98F; margin-bottom:26px; display:flex; align-items:center; gap:12px}
  .dot{width:8px; height:8px; background:var(--orange); box-shadow:0 0 12px var(--orange)}
  h1{font:600 clamp(36px,6vw,86px)/1.0 'Pixelify Sans','Space Grotesk',sans-serif; letter-spacing:0.01em; text-transform:uppercase; overflow-wrap:break-word}
  h1 .it{color:var(--orange)}
  h2{font:600 clamp(28px,4.4vw,58px)/1.06 'Pixelify Sans','Space Grotesk',sans-serif; text-transform:uppercase; letter-spacing:.01em; overflow-wrap:break-word}
  .lead{font:400 clamp(18px,2.1vw,30px)/1.5 'Inter',sans-serif; color:#D8C8B8; max-width:24ch; margin-top:26px; text-wrap:balance}
  .lead b{color:var(--ink); font-weight:600}
  .sub{font:400 clamp(15px,1.5vw,20px)/1.6 'Inter',sans-serif; color:var(--dim); max-width:46ch; margin-top:20px}
  .rows{display:flex; flex-direction:column; gap:16px; margin-top:34px; width:min(880px,90vw)}
  .row{display:flex; gap:18px; align-items:flex-start}
  .num{flex:none; width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font:700 13px/1 'JetBrains Mono',monospace; color:#150a02; background:linear-gradient(135deg,var(--amber),var(--orange))}
  .row .t{font:400 clamp(16px,1.7vw,23px)/1.45 'Inter',sans-serif; color:#E7E9EC}
  .row .t b{color:var(--ink)}
  .pills{display:flex; flex-wrap:wrap; gap:11px; margin-top:30px}
  .pill{font:600 13px/1 'JetBrains Mono',monospace; letter-spacing:.04em; color:var(--green); background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.34); border-radius:999px; padding:10px 15px}
  .pill.o{color:var(--amber); background:rgba(255,122,26,0.09); border-color:rgba(255,122,26,0.34)}
  .verdict{display:flex; gap:18px; margin-top:34px; flex-wrap:wrap}
  .v{font:700 clamp(22px,3vw,42px)/1 'Space Grotesk','Bodoni Moda',sans-serif; padding:16px 26px; border-radius:12px; border:1px solid rgba(255,255,255,0.12)}
  .v.allow{color:#5F636D} .v.hold{color:#1c0d02; background:linear-gradient(135deg,var(--amber),#F5A623)} .v.block{color:#FF6A3D; border-color:rgba(255,106,61,.4)}
  .big{font:700 clamp(60px,12vw,180px)/0.9 'Space Grotesk',sans-serif; letter-spacing:-0.03em; color:var(--orange); margin-top:10px}
  .close-tag{font:400 clamp(20px,2.4vw,34px)/1.4 'Inter',sans-serif; color:#D8C8B8; margin-top:24px}
  .close-tag b{color:var(--ink)}
  .graphwrap{position:relative; width:min(520px,80vw); aspect-ratio:1/1; margin-top:18px}
  .node{position:absolute; width:14px; height:14px; border-radius:50%; background:var(--orange); box-shadow:0 0 14px var(--orange); transform:translate(-50%,-50%)}
  .epi{width:26px; height:26px; background:#0b0806; border:3px solid var(--amber); box-shadow:0 0 24px var(--orange)}
  .edge{position:absolute; height:1.5px; background:linear-gradient(90deg,rgba(255,122,26,.0),rgba(255,122,26,.7),rgba(255,122,26,0)); transform-origin:left center}
  .hud{position:fixed; left:0; right:0; bottom:0; z-index:5; display:flex; align-items:center; gap:16px; padding:16px 22px}
  .bar{flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden}
  .bar i{display:block; height:100%; background:linear-gradient(90deg,var(--amber),var(--orange),#F0480A); width:0; transition:width .4s ease}
  .count{font:600 12px/1 'JetBrains Mono',monospace; color:#8B9099; letter-spacing:.1em}
  .brand{position:fixed; top:20px; left:24px; z-index:5; font:600 15px/1 'Bodoni Moda',serif; letter-spacing:.18em; color:#C9A98F}
  .hint{position:fixed; top:20px; right:24px; z-index:5; font:500 11px/1 'JetBrains Mono',monospace; color:#5f4836; letter-spacing:.08em}
  @media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>
</head>
<body>
<div class="grain"></div><div class="glow"></div>
<div class="brand">KEYSTONE</div>
<div class="hint">&larr; &rarr; or click &middot; F fullscreen</div>
<div class="stage" id="stage"></div>
<div class="hud"><div class="bar"><i id="prog"></i></div><div class="count" id="count">01 / 09</div></div>

<script>
var SLIDES = [
  {eyebrow:"GitLab Transcend &middot; Orbit", html:'<h1>Merge requests<br>that break<br><span class="it">together</span></h1><div class="lead"><b>Keystone</b> - the first merge gate for AI coding agents, on the GitLab Orbit graph.</div>'},
  {eyebrow:"The problem", html:'<h2>Two safe merge requests.<br>One broken production.</h2><div class="lead">Different files. Both pass review. <b>No Git conflict.</b> They still break together - because one changes a function the other depends on.</div>'},
  {eyebrow:"Why review misses it", html:'<h2>Git compares files.<br>The break lives in the graph.</h2><div class="rows"><div class="row"><span class="num">1</span><div class="t"><b>Git diff / merge train</b> - no textual overlap, so no conflict.</div></div><div class="row"><span class="num">2</span><div class="t"><b>CODEOWNERS</b> - each MR looks fine to its own owners.</div></div><div class="row"><span class="num">3</span><div class="t"><b>The call graph</b> sees the shared dependents. Nothing else does.</div></div></div>'},
  {eyebrow:"The insight", html:'<h2>Orbit sees the<br>transitive intersection.</h2><div class="graphwrap" id="gw"></div>', graph:true},
  {eyebrow:"What Keystone does", html:'<h2>A deterministic gate.<br>No model decides.</h2><div class="verdict"><div class="v allow">ALLOW</div><div class="v hold">HOLD</div><div class="v block">BLOCK</div></div><div class="sub">Blast radius &rarr; policy tier &rarr; required approvers. Every decision lands in a tamper-evident, hash-chained ledger. <b style="color:#9DEFC4">Zero LLM on the verdict.</b></div>'},
  {eyebrow:"The new capability", html:'<h2>It holds AI coding<br>agents accountable.</h2><div class="lead">An agent cannot self-approve. A recorded human rejection of a blast signature <b>blocks re-approval by any party</b> - the precedent memory gate.</div>'},
  {eyebrow:"Real, three ways", html:'<h2>The same Orbit SQL,<br>three independent runs.</h2><div class="rows"><div class="row"><span class="num">&#10003;</span><div class="t">Server-side on the deployed engine &rarr; <b>ring-1 = 12</b></div></div><div class="row"><span class="num">&#10003;</span><div class="t"><b>duckdb-wasm in your browser</b> - same query, same 12</div></div><div class="row"><span class="num">&#10003;</span><div class="t">The test suite recomputes it - they all converge</div></div></div>'},
  {eyebrow:"Any repo, zero setup", html:'<h2>Not just Orbit-Local orgs.<br>Any repo. Any CI.</h2><div class="lead"><code style="color:#9DEFC4">scan-repo owner/repo</code> builds the Orbit graph on the fly and gates it - no pre-indexing, no Orbit binary.</div><div class="pills"><span class="pill">124 tests pass</span><span class="pill o">No LLM verdict</span><span class="pill">Live backend</span><span class="pill o">Tamper-evident</span></div>'},
  {eyebrow:"Keystone", html:'<h2>Git sees files.</h2><h2 style="color:#C9A98F">Orbit sees relationships.</h2><h2 style="color:var(--orange)">Keystone sees consequences.</h2><div class="close-tag">Now, the live product. <b>A real repo. A real collision. Blocked before merge.</b></div>'}
];

var stage = document.getElementById('stage'), prog = document.getElementById('prog'), count = document.getElementById('count');
var i = 0, els = [];
SLIDES.forEach(function(s, n){
  var d = document.createElement('div'); d.className = 'slide';
  d.innerHTML = '<div class="eyebrow"><span class="dot"></span>' + s.eyebrow + '</div>' + s.html;
  stage.appendChild(d); els.push(d);
  if (s.graph) buildGraph(d.querySelector('#gw'));
});
function buildGraph(wrap){
  if(!wrap) return;
  var R=44, cx=50, cy=50, n=9;
  var epi=document.createElement('div'); epi.className='node epi'; epi.style.left='50%'; epi.style.top='50%';
  for(var k=0;k<n;k++){
    var a=(k/n)*Math.PI*2 - Math.PI/2; var x=cx+Math.cos(a)*R, y=cy+Math.sin(a)*R;
    var e=document.createElement('div'); e.className='edge';
    var dx=(x-cx), dy=(y-cy); var len=Math.sqrt(dx*dx+dy*dy);
    e.style.left=cx+'%'; e.style.top=cy+'%'; e.style.width=len+'%'; e.style.transform='rotate('+Math.atan2(dy,dx)+'rad)';
    wrap.appendChild(e);
    var nd=document.createElement('div'); nd.className='node'; nd.style.left=x+'%'; nd.style.top=y+'%';
    if(k===2||k===6){ nd.style.background='#FF6A3D'; nd.style.boxShadow='0 0 16px #FF6A3D'; nd.style.width='18px'; nd.style.height='18px'; }
    wrap.appendChild(nd);
  }
  wrap.appendChild(epi);
}
function show(n){
  i = Math.max(0, Math.min(SLIDES.length-1, n));
  els.forEach(function(e,k){ e.classList.toggle('on', k===i); });
  prog.style.width = ((i+1)/SLIDES.length*100) + '%';
  count.textContent = String(i+1).padStart(2,'0') + ' / ' + String(SLIDES.length).padStart(2,'0');
}
function next(){ show(i+1); } function prev(){ show(i-1); }
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ show(0); } else if(e.key==='End'){ show(SLIDES.length-1); }
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement){ document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); } else { document.exitFullscreen&&document.exitFullscreen(); } }
});
document.addEventListener('click', function(e){ if(e.clientX < window.innerWidth*0.25) prev(); else next(); });
show(0);
</script>
</body>
</html>
