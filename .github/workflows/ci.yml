# Keystone CI on GitHub: run the engine tests on every push, and publish the
# self-contained web hero to GitHub Pages. Mirrors .gitlab-ci.yml so the repo
# yields a green badge and a live link on either host, with no paid services.
name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install --quiet -r requirements.txt
      - run: python -m pytest -q
      # enforceable governance gate (in-process): a clean symbol passes; a symbol
      # with a prior identical-blast-radius rejection would exit non-zero and block.
      - run: python skills/keystone/run_review.py metrics --local --fixture --fail-on-contradiction
      # committed static bundle must equal a fresh build (no silent drift)
      - run: python scripts/build_static.py
      - run: git diff --exit-code -- web/data.json web/orbit_sample_transcript.json

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install --quiet duckdb
      - run: python scripts/build_static.py
      - run: mkdir -p public && cp -r web/* public/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
