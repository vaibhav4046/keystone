# One-click LIVE backend on Render's free tier (no card). A remote judge then hits the
# REAL product, not the static snapshot: the live `orbit sql` cross-check, the tool-using
# agent, and the real LLM brief (add a free key as a secret env var below).
#
#   1. Push this repo to GitHub (already done).
#   2. render.com -> New -> Blueprint -> connect this repo -> Apply.
#   3. (optional) add OPENROUTER_API_KEY (or CEREBRAS/GROQ/GEMINI) under Environment
#      to light up the real LLM brief + agent; without it the live demo runs the
#      deterministic plan. Never commit the key.
services:
  - type: web
    name: keystone
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: KEYSTONE_GRAPH_PATH
        value: data/keystone_self_graph.duckdb
      - key: KEYSTONE_PREFER_LIVE
        value: "1"
      # The hero is served SAME-ORIGIN by the backend, so no CORS config is needed.
      # Add a free LLM key here in the dashboard (do NOT commit it) to enable real AI:
      # - key: OPENROUTER_API_KEY
      #   sync: false
