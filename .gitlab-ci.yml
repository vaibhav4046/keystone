# Keystone CI: prove the engine on every push, and publish the web hero to
# GitLab Pages with no extra accounts or paid services. Pushing to GitLab gives
# a green test badge AND a judge-clickable live link at the Pages URL.
stages:
  - test
  - gate
  - deploy

test:
  stage: test
  image: python:3.13-slim
  script:
    - pip install --quiet -r requirements.txt
    - python -m pytest -q
    # committed static bundle must equal a fresh build (no silent drift)
    - python scripts/build_static.py
    - git diff --exit-code -- web/data.json web/orbit_sample_transcript.json
  rules:
    - when: always

# Enforceable governance gate: fails the pipeline (exit non-zero) when a touched
# symbol carries a prior identical-blast-radius rejection. Run in-process, no server.
# This turns the review from voluntary tooling into a real CI control. Point the
# symbol at what an MR actually changes (here a clean symbol keeps the demo green).
governance-gate:
  stage: gate
  image: python:3.13-slim
  script:
    - pip install --quiet -r requirements.txt
    - python skills/keystone/run_review.py metrics --local --fixture --fail-on-contradiction
  rules:
    - when: always

# Demonstration that the gate BLOCKS a contradicted change (allowed to fail so the
# pipeline still goes green; in a real setup this job would block the merge).
governance-gate-demo:
  stage: gate
  image: python:3.13-slim
  allow_failure: true
  script:
    - pip install --quiet -r requirements.txt
    - python skills/keystone/run_review.py tokenize --local --fixture --fail-on-contradiction
  rules:
    - when: always

# Publishes the self-contained static hero (live-API-first, FALLBACK bundle when
# no backend is reachable). build_static.py regenerates web/data.json from the
# engine, then web/ is copied to public/ which GitLab Pages serves.
pages:
  stage: deploy
  image: python:3.13-slim
  script:
    - pip install --quiet -r requirements.txt
    - python scripts/build_static.py
    - python -c "import json; d=json.load(open('web/data.json')); assert d['definitions'] and d['impact']"
    - rm -rf public && mkdir public && cp -r web/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
