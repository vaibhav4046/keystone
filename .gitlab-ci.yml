# Keystone CI: prove the engine on every push, and publish the web hero to
# GitLab Pages with no extra accounts or paid services. Pushing to GitLab gives
# a green test badge AND a judge-clickable live link at the Pages URL.
stages:
  - test
  - gate
  - deploy

test:
  stage: test
  image: python:3.13-slim
  script:
    - pip install --quiet -r requirements.txt
    - python -m pytest -q
    # committed static bundle must equal a fresh build from the committed real Orbit
    # self-index + provenance + recorded agent sample (no silent drift)
    - python scripts/build_static.py
    - git diff --exit-code -- web/data.json
  rules:
    - when: always

# Enforceable governance gate: fails the pipeline (exit non-zero) when a touched
# symbol carries a prior identical-blast-radius rejection. Run in-process, no server.
# This turns the review from voluntary tooling into a real CI control. Point the
# symbol at what an MR actually changes (here a clean symbol keeps the demo green).
governance-gate:
  stage: gate
  image: python:3.13-slim
  # Mint a GitLab OIDC ID token for THIS job. The runner injects it as $KEYSTONE_ID_TOKEN;
  # Keystone binds the recorded actor to its `sub` claim, so a pipeline decision is
  # GitLab-attested (self_asserted=False), closing the self-asserted-identity gap on the
  # path that matters most for supply-chain attestation.
  id_tokens:
    KEYSTONE_ID_TOKEN:
      aud: https://keystone.example/ci
  variables:
    # verify the token's RS256 signature against the issuer JWKS and enforce the audience the
    # id_tokens block above minted, so the bound identity is cryptographically checked, not just
    # decoded. KEYSTONE_STRICT_OVERRIDE refuses an override that is not identity-bound.
    KEYSTONE_VERIFY_OIDC: "1"
    KEYSTONE_OIDC_AUD: https://keystone.example/ci
    KEYSTONE_STRICT_OVERRIDE: "1"
  script:
    - pip install --quiet -r requirements.txt
    # the SAME policy gate the API uses: a clean symbol passes, a BLOCKed one fails
    - python skills/keystone/run_review.py metrics --local --fixture --fail-on-block
    # record a GitLab-ATTESTED approval (the output shows "identity: GitLab-attested",
    # not self-asserted) to demonstrate the cryptographically-bound actor on the CI path
    - python skills/keystone/run_review.py metrics --local --fixture --decide approve --reviewer "$GITLAB_USER_LOGIN" --reason "pipeline-gated approval (OIDC-bound actor)"
  rules:
    - when: always

# Demonstration that the gate BLOCKS a contradicted change. allow_failure keeps the
# pipeline green while showing the refusal; in a real MR this would block the merge.
governance-gate-demo:
  stage: gate
  image: python:3.13-slim
  allow_failure: true
  script:
    - pip install --quiet -r requirements.txt
    - python skills/keystone/run_review.py tokenize --local --fixture --fail-on-block
  rules:
    - when: always

# Publishes the self-contained static hero (live-API-first, FALLBACK bundle when
# no backend is reachable). build_static.py regenerates web/data.json from the
# engine, then web/ is copied to public/ which GitLab Pages serves.
pages:
  stage: deploy
  image: python:3.13-slim
  script:
    - pip install --quiet -r requirements.txt
    - python scripts/build_static.py
    - python -c "import json; d=json.load(open('web/data.json')); assert d['definitions'] and d['impact']"
    - rm -rf public && mkdir public && cp -r web/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
